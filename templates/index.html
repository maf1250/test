<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poe Chat Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 {
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      margin-top: 12px;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    .box {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: #f9f9f9;
      white-space: pre-wrap;
    }
    .error {
      color: darkred;
    }
  </style>
</head>
<body>
  <h1>Poe Chat</h1>

  <textarea id="message" placeholder="Type your message here..."></textarea>
  <br />
  <button onclick="sendMessage()">Send</button>

  <div class="box" id="result">Response will appear here...</div>

  <script>
    async function sendMessage() {
      const message = document.getElementById("message").value.trim();
      const result = document.getElementById("result");

      if (!message) {
        result.innerHTML = '<span class="error">Please enter a message.</span>';
        return;
      }

      result.textContent = "Thinking...";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await res.json();

        if (!res.ok) {
          result.innerHTML = `<span class="error">${data.error || "Unknown error"}</span>`;
          return;
        }

        result.textContent = data.reply;
      } catch (err) {
        result.innerHTML = `<span class="error">${err.message}</span>`;
      }
    }
  </script>
</body>
</html>
