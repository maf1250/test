<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>محادثة Poe</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Cairo", Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      min-height: 100vh;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      overflow: hidden;
      border: 1px solid rgba(226, 232, 240, 0.8);
    }

    .header {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: white;
      padding: 28px 24px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
    }

    .header p {
      margin: 10px 0 0;
      font-size: 15px;
      opacity: 0.95;
    }

    .content {
      padding: 24px;
    }

    .label {
      display: block;
      margin-bottom: 10px;
      font-weight: 700;
      font-size: 15px;
      color: #334155;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      padding: 16px;
      font-family: inherit;
      font-size: 16px;
      outline: none;
      transition: all 0.25s ease;
      background: #f8fafc;
    }

    textarea:focus {
      border-color: #4f46e5;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 22px;
      font-size: 16px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .send-btn {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: white;
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
    }

    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 25px rgba(79, 70, 229, 0.32);
    }

    .clear-btn {
      background: #e2e8f0;
      color: #1e293b;
    }

    .clear-btn:hover {
      background: #cbd5e1;
    }

    .result-section {
      margin-top: 24px;
    }

    .result-title {
      margin-bottom: 10px;
      font-weight: 700;
      font-size: 15px;
      color: #334155;
    }

    .box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 18px;
      min-height: 120px;
      white-space: pre-wrap;
      line-height: 1.9;
      font-size: 16px;
      color: #0f172a;
    }

    .placeholder {
      color: #64748b;
    }

    .error {
      color: #b91c1c;
      font-weight: 600;
    }

    .loading {
      color: #334155;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dots {
      display: inline-flex;
      gap: 4px;
    }

    .dots span {
      width: 8px;
      height: 8px;
      background: #4f46e5;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0.7);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .footer-note {
      margin-top: 16px;
      font-size: 13px;
      color: #64748b;
      text-align: center;
    }

    @media (max-width: 600px) {
      .header h1 {
        font-size: 24px;
      }

      .content {
        padding: 18px;
      }

      textarea {
        min-height: 130px;
      }

      button {
        width: 100%;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>محادثة Poe</h1>
      <p>اكتب رسالتك وسيقوم المساعد بالرد عليك مباشرة</p>
    </div>

    <div class="content">
      <label class="label" for="message">اكتب رسالتك</label>
      <textarea id="message" placeholder="اكتب سؤالك أو طلبك هنا..."></textarea>

      <div class="actions">
        <button class="send-btn" onclick="sendMessage()">إرسال</button>
        <button class="clear-btn" onclick="clearChat()">مسح</button>
      </div>

      <div class="result-section">
        <div class="result-title">الرد</div>
        <div class="box" id="result">
          <span class="placeholder">سيظهر الرد هنا...</span>
        </div>
      </div>

      <div class="footer-note">
        تأكد من ضبط مفتاح API واسم الموديل بشكل صحيح في الخلفية
      </div>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const message = document.getElementById("message").value.trim();
      const result = document.getElementById("result");

      if (!message) {
        result.innerHTML = '<span class="error">يرجى كتابة رسالة أولاً.</span>';
        return;
      }

      result.innerHTML = `
        <div class="loading">
          <span>جاري التفكير</span>
          <span class="dots">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </div>
      `;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await res.json();

        if (!res.ok) {
          result.innerHTML = `<span class="error">${data.error || "حدث خطأ غير معروف."}</span>`;
          return;
        }

        result.textContent = data.reply || "لم يتم استلام رد.";
      } catch (err) {
        result.innerHTML = `<span class="error">تعذر الاتصال بالخادم: ${err.message}</span>`;
      }
    }

    function clearChat() {
      document.getElementById("message").value = "";
      document.getElementById("result").innerHTML = '<span class="placeholder">سيظهر الرد هنا...</span>';
    }

    document.getElementById("message").addEventListener("keydown", function(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
